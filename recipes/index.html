<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Recipes">
    <meta name="author" content="Andrew McKenzie">
    <title>Recipes</title>
    <link rel="stylesheet" href="recipes.css">
    <script defer src="recipes.js"></script>

    
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipes">
    <meta property="og:description" content="Recipes">
    <meta property="og:url" content="https://ajmckenzie.github.io/wdd131/recipes/index.html">
    <meta property="og:image" content="images/apple-crisp.jpg">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Recipes">
    <meta name="twitter:description" content="Recipes">
    <meta name="twitter:image" content="images/apple-crisp.jpg">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
</head>
<body>
    <div class="content">
    <header>
        <div class="logo">
            <img src="images/recipe-book.png" alt="recipe book icon">
            <h1>RecipeBook</h1>
        </div>
        <div class="search">
            <input id="searchInput" placeholder="Find a recipe">
            <button id="searchButton"><img src="images/search.svg" alt="search icon"></button>
        </div>
    </header>
    <hr>
    <main>
        <div class="recipe">
            <img src="images/apple-crisp.jpg" alt="apple crisp">
            <div class="recipeInfo">
                <button>dessert</button>
                <h2>Apple Crisp</h2>
                <span
                    class="rating"
                    role="img"
                    aria-label="Rating: 4 out of 5 stars"
                >
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star-empty">⭐</span>
                    <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>
                <p class="description">This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.</p>
            </div>
        </div>
    </main>
    <footer>
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>
    </footer>
    </div>
</body>
</html>
