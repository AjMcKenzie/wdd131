<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Event ticket form for WDD 131: Dynamic Web Fundamentals.">
    <meta name="author" content="Andrew McKenzie">
    <title>Event Ticket Form</title>
    <link rel="stylesheet" href="event.css">
    <script src="event.js" defer></script>
</head>
<body>
    <main class="wrapper">
    <h1>Event Ticket</h1>

    <form id="eventForm">
        <div class="field">
            <label for="firstName">First Name</label>
            <input id="firstName" name="firstName" type="text" required />
        </div>

        <div class="field">
            <label for="lastName">Last Name</label>
            <input id="lastName" name="lastName" type="text" required />
        </div>

        <div class="field full">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
        </div>

        <div class="field">
            <label for="login">Type</label>
            <select 
                id="login"
                name="login"
                aria-controls="notesContainer"
                required>

                <option value="">Choose one</option>
                <option value="student">Student</option>
                <option value="guest">Guest</option>
            </select>
        </div>

        <div class="field">
            <label for="eventDate">Event Date</label>
            <input id="eventDate" name="eventDate" type="date" required />
        </div>

        <div id="studentIdContainer" class="field full" hidden>
            <label for="studentId">Student I#</label>
            <input id="studentId" name="studentId" type="text" />
        </div>

        <div id="accessCodeContainer" class="field full" hidden>
            <label for="accessCode">Access Code</label>
            <input id="accessCode" name="accessCode" type="text" />
        </div>

        <button class="full" type="submit">Create Ticket</button>
    </form>

    <section id="output" aria-live="polite"></section>
  </main>
</body>
</html>
